name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          qtbase5-dev \
          qtdeclarative5-dev \
          qttools5-dev \
          qt5-qmake

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build
      run: cargo build --verbose
